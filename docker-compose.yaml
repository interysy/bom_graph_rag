services:
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: apex-bom
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=admin
    volumes:
      - ./fuseki-data:/fuseki
    networks:
      - apex-net
    restart: unless-stopped

networks:
  apex-net:
    driver: bridge